org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Opt out of AGP 9's new DSL / built-in Kotlin so this project keeps working
# with the classic Flutter Gradle setup (kotlin-android plugin + kotlinOptions).
# These are official, supported escape hatches until AGP 10 (see Flutter's
# migrate-to-agp-9 docs). Safe to remove once the project is fully migrated.
android.newDsl=false
android.builtInKotlin=false
